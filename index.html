<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>법인 가계부</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f3; color: #1a1a1a; font-size: 14px; min-height: 100vh; }

/* 레이아웃 */
.sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 220px; background: #1a1a1a; color: #fff; display: flex; flex-direction: column; z-index: 100; }
.main { margin-left: 220px; padding: 24px; min-height: 100vh; }

/* 사이드바 */
.sidebar-logo { padding: 20px 16px 16px; font-size: 16px; font-weight: 700; border-bottom: 1px solid #333; }
.sidebar-logo span { font-size: 11px; font-weight: 400; color: #888; display: block; margin-top: 2px; }
.company-list { flex: 1; overflow-y: auto; padding: 8px 0; }
.company-item { padding: 10px 16px; cursor: pointer; font-size: 13px; color: #ccc; display: flex; align-items: center; gap: 8px; border-left: 3px solid transparent; transition: all .15s; }
.company-item:hover { background: #252525; color: #fff; }
.company-item.active { background: #252525; color: #fff; border-left-color: #fff; }
.company-item .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.company-all { padding: 10px 16px; cursor: pointer; font-size: 13px; color: #ccc; border-top: 1px solid #333; border-left: 3px solid transparent; }
.company-all:hover, .company-all.active { background: #252525; color: #fff; border-left-color: #aaa; }
.sidebar-add { padding: 12px 16px; border-top: 1px solid #333; }
.sidebar-add button { width: 100%; padding: 8px; background: #333; border: none; color: #fff; border-radius: 6px; cursor: pointer; font-size: 13px; }
.sidebar-add button:hover { background: #444; }

/* 탭 */
.tabs { display: flex; gap: 0; margin-bottom: 20px; border-bottom: 1px solid #ddd; }
.tab { padding: 9px 18px; border: none; background: none; cursor: pointer; font-size: 14px; color: #888; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all .15s; }
.tab:hover { color: #333; }
.tab.active { color: #1a1a1a; border-bottom-color: #1a1a1a; font-weight: 600; }

/* 카드 */
.card { background: #fff; border: 1px solid #e5e5e5; border-radius: 10px; padding: 16px; margin-bottom: 16px; }
.card-title { font-size: 15px; font-weight: 600; margin-bottom: 12px; }

/* 요약 카드 */
.summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 16px; }
.sum-card { background: #fff; border: 1px solid #e5e5e5; border-radius: 8px; padding: 12px 16px; }
.sum-label { font-size: 11px; color: #888; margin-bottom: 4px; }
.sum-val { font-size: 17px; font-weight: 700; }
.green { color: #1a7a4a; } .red { color: #c0392b; }

/* 필터 */
.filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; align-items: center; }
input, select, textarea { padding: 7px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; background: #fff; color: #1a1a1a; font-family: inherit; }
input:focus, select:focus, textarea:focus { outline: none; border-color: #888; }

/* 버튼 */
.btn { padding: 7px 14px; border-radius: 6px; border: 1px solid #ddd; background: #fff; cursor: pointer; font-size: 13px; color: #1a1a1a; }
.btn:hover { background: #f5f5f3; }
.btn-primary { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
.btn-primary:hover { background: #333; }
.btn-sm { padding: 3px 8px; font-size: 11px; border-radius: 4px; border: 1px solid #e5e5e5; background: #fff; cursor: pointer; color: #666; }
.btn-sm:hover { background: #f5f5f3; }
.btn-danger { color: #c0392b; }
.ml-auto { margin-left: auto; display: flex; gap: 8px; }

/* 테이블 */
.tbl-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
th { padding: 8px 8px; text-align: left; background: #f8f8f7; font-weight: 600; border-bottom: 1px solid #e5e5e5; white-space: nowrap; font-size: 11px; color: #555; }
td { padding: 6px 8px; border-bottom: 1px solid #f0f0f0; }
tr:hover td { background: #fafafa; }
.tr { text-align: right; } .tnw { white-space: nowrap; }
.tel { max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* 배지 */
.badge { display: inline-block; font-size: 11px; padding: 2px 7px; border-radius: 4px; white-space: nowrap; }

/* 모달 */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 300; align-items: flex-start; justify-content: center; padding-top: 40px; overflow-y: auto; }
.overlay.show { display: flex; }
.modal { background: #fff; border-radius: 12px; padding: 24px 28px; width: min(640px, 95vw); max-height: 85vh; overflow-y: auto; }
.modal-hd { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
.modal-title { font-size: 17px; font-weight: 700; }
.close-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: #999; line-height: 1; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.span2 { grid-column: span 2; }
.field label { display: block; font-size: 12px; color: #666; margin-bottom: 4px; font-weight: 500; }
.field input, .field select, .field textarea { width: 100%; }
.split-box { border: 1px solid #e5e5e5; border-radius: 8px; padding: 12px; margin-bottom: 8px; background: #fafafa; }
.check-row { display: flex; align-items: center; gap: 8px; margin: 12px 0 8px; font-size: 13px; }
.check-row input[type=checkbox] { width: auto; }

/* 설정 트리 */
.tree-item { display: flex; align-items: center; gap: 6px; padding: 5px 0; }
.tree-sub { margin-left: 16px; border-left: 2px solid #f0f0f0; padding-left: 10px; }
.tree-sub2 { margin-left: 12px; border-left: 2px solid #f5f5f5; padding-left: 8px; }

/* 페이지 헤더 */
.page-hd { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.page-hd h2 { font-size: 20px; font-weight: 700; }
.company-badge { font-size: 12px; padding: 3px 10px; border-radius: 20px; color: #fff; }

/* 리포트 */
.report-month { margin-bottom: 16px; }
.report-month-hd { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; background: #f8f8f7; border-radius: 8px 8px 0 0; border: 1px solid #e5e5e5; cursor: pointer; }
.report-month-body { border: 1px solid #e5e5e5; border-top: none; border-radius: 0 0 8px 8px; overflow: hidden; }

/* 현금흐름 */
.cf-group-hd td { font-weight: 700; background: #f8f8f7; font-size: 12px; }

@media (max-width: 768px) {
  .sidebar { width: 180px; }
  .main { margin-left: 180px; padding: 16px; }
  .summary { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>

<!-- 사이드바 -->
<div class="sidebar">
  <div class="sidebar-logo">📒 법인 가계부<span>멀티 법인 관리</span></div>
  <div class="company-list" id="company-list"></div>
  <div class="company-all" id="all-btn" onclick="selectCompany('__all__')">📊 전체 합산 보기</div>
  <div class="sidebar-add">
    <button onclick="openCompanyForm()">+ 법인 추가</button>
  </div>
</div>

<!-- 메인 -->
<div class="main">
  <div class="page-hd">
    <h2 id="page-title">법인을 선택하세요</h2>
    <span class="company-badge" id="company-badge" style="display:none"></span>
    <div style="margin-left:auto;display:flex;gap:8px" id="company-actions" style="display:none">
      <button class="btn" onclick="editCurrentCompany()" id="btn-edit-company">법인 수정</button>
    </div>
  </div>

  <div id="no-company" style="text-align:center;padding:80px 20px;color:#aaa">
    <div style="font-size:48px;margin-bottom:16px">🏢</div>
    <div style="font-size:16px;margin-bottom:8px">좌측에서 법인을 추가하세요</div>
    <div style="font-size:13px">법인별로 거래내역과 계정과목을 따로 관리할 수 있어요</div>
  </div>

  <div id="content-area" style="display:none">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('ledger')">거래내역</button>
      <button class="tab" onclick="switchTab('monthly')">월별 리포트</button>
      <button class="tab" onclick="switchTab('yearly')">연도별 리포트</button>
      <button class="tab" onclick="switchTab('cashflow')">현금흐름표</button>
      <button class="tab" onclick="switchTab('settings')" id="tab-settings-btn">계좌·계정 설정</button>
    </div>

    <!-- 거래내역 -->
    <div id="tab-ledger">
      <div class="filters">
        <input id="search" placeholder="검색..." oninput="renderLedger()" style="width:130px">
        <select id="f-month" onchange="renderLedger()"><option value="">전체 월</option></select>
        <select id="f-cat1" onchange="renderLedger()"><option value="">전체 분류</option></select>
        <select id="f-wallet" onchange="renderLedger()"><option value="">전체 계좌</option></select>
        <div class="ml-auto">
          <button class="btn" onclick="openPaste()" id="btn-ai">🤖 AI 자동분류</button>
          <button class="btn btn-primary" onclick="openForm()" id="btn-add">+ 거래 추가</button>
        </div>
      </div>
      <div class="summary" id="summary"></div>
      <div class="card" style="padding:0">
        <div class="tbl-wrap">
          <table>
            <thead><tr>
              <th>법인</th><th>거래월</th><th>기재내용</th>
              <th class="tr">입금</th><th class="tr">출금</th>
              <th>1차</th><th>2차</th><th>3차</th><th>비고</th><th>계좌</th><th></th>
            </tr></thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- 월별 리포트 -->
    <div id="tab-monthly" style="display:none">
      <div id="monthly-content"></div>
    </div>

    <!-- 연도별 리포트 -->
    <div id="tab-yearly" style="display:none">
      <div id="yearly-content"></div>
    </div>

    <!-- 현금흐름표 -->
    <div id="tab-cashflow" style="display:none">
      <div id="cashflow-content"></div>
    </div>

    <!-- 설정 -->
    <div id="tab-settings" style="display:none">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
        <!-- 계좌 -->
        <div class="card">
          <div class="card-title">계좌 관리</div>
          <div style="font-size:12px;color:#888;margin-bottom:10px">Shift+Enter로 여러 개 동시 입력, Enter로 추가</div>
          <div id="wallet-list"></div>
          <textarea id="new-wallet" rows="2" placeholder="새 계좌명&#10;여러 개는 Shift+Enter 구분"
            style="width:100%;margin-top:8px;resize:none"
            onkeydown="handleKey(event,'wallet')"></textarea>
          <button class="btn btn-primary" onclick="addWallet()" style="width:100%;margin-top:6px">추가</button>
        </div>

        <!-- 계정과목 -->
        <div class="card">
          <div class="card-title">계정과목 추가</div>
          <div style="font-size:12px;color:#888;margin-bottom:10px">1차 → 2차 → 3차 순서로 등록</div>

          <div style="background:#f8f8f7;border-radius:8px;padding:12px;margin-bottom:10px">
            <div style="font-size:12px;font-weight:600;margin-bottom:6px">1차 계정과목</div>
            <textarea id="new-cat1" rows="2" placeholder="매출액&#10;Shift+Enter로 여러 개"
              style="width:100%;resize:none" onkeydown="handleKey(event,'cat1')"></textarea>
            <button class="btn btn-primary" onclick="addCat1()" style="width:100%;margin-top:6px">추가</button>
          </div>

          <div style="background:#f8f8f7;border-radius:8px;padding:12px;margin-bottom:10px">
            <div style="font-size:12px;font-weight:600;margin-bottom:6px">2차 계정과목</div>
            <select id="sel-p1" style="width:100%;margin-bottom:6px"><option value="">1차 선택...</option></select>
            <textarea id="new-cat2" rows="2" placeholder="임대매출&#10;세일즈위탁&#10;Shift+Enter로 여러 개"
              style="width:100%;resize:none" onkeydown="handleKey(event,'cat2')"></textarea>
            <button class="btn btn-primary" onclick="addCat2()" style="width:100%;margin-top:6px">추가</button>
          </div>

          <div style="background:#f8f8f7;border-radius:8px;padding:12px">
            <div style="font-size:12px;font-weight:600;margin-bottom:6px">3차 계정과목 <span style="color:#aaa;font-weight:400">(선택)</span></div>
            <select id="sel-p1-3" style="width:100%;margin-bottom:6px" onchange="updateSel23()"><option value="">1차 선택...</option></select>
            <select id="sel-p2-3" style="width:100%;margin-bottom:6px"><option value="">2차 선택...</option></select>
            <textarea id="new-cat3" rows="2" placeholder="직영&#10;위탁&#10;Shift+Enter로 여러 개"
              style="width:100%;resize:none" onkeydown="handleKey(event,'cat3')"></textarea>
            <button class="btn btn-primary" onclick="addCat3()" style="width:100%;margin-top:6px">추가</button>
          </div>
        </div>

        <!-- 전체 트리 -->
        <div class="card" style="grid-column:span 2">
          <div class="card-title">계정과목 전체 목록</div>
          <div id="accounts-tree"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 법인 추가/수정 모달 -->
<div class="overlay" id="company-overlay" onclick="bgClose(event,'company-overlay')">
  <div class="modal" style="max-width:400px">
    <div class="modal-hd">
      <span class="modal-title" id="company-modal-title">법인 추가</span>
      <button class="close-btn" onclick="closeOverlay('company-overlay')">×</button>
    </div>
    <div class="field" style="margin-bottom:12px">
      <label>법인명 *</label>
      <input id="c-name" placeholder="(주)홍길동" style="width:100%">
    </div>
    <div class="field" style="margin-bottom:12px">
      <label>사업자번호</label>
      <input id="c-regno" placeholder="000-00-00000" style="width:100%">
    </div>
    <div class="field" style="margin-bottom:16px">
      <label>색상</label>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px" id="color-picker"></div>
    </div>
    <div style="display:flex;justify-content:flex-end;gap:8px">
      <button class="btn" onclick="closeOverlay('company-overlay')">취소</button>
      <button class="btn btn-primary" onclick="saveCompany()">저장</button>
    </div>
  </div>
</div>

<!-- 거래 추가/수정 모달 -->
<div class="overlay" id="form-overlay" onclick="bgClose(event,'form-overlay')">
  <div class="modal">
    <div class="modal-hd">
      <span class="modal-title" id="form-title">거래 추가</span>
      <button class="close-btn" onclick="closeOverlay('form-overlay')">×</button>
    </div>
    <div class="grid2" style="margin-bottom:10px">
      <div class="field"><label>거래일시</label><input id="f-date" placeholder="2026.01.05 10:00"></div>
      <div class="field"><label>거래월</label><input id="f-month-val" placeholder="26년 01월"></div>
      <div class="field span2"><label>기재내용</label><input id="f-desc"></div>
      <div class="field"><label>계좌</label><select id="f-wallet-sel" style="width:100%"></select></div>
      <div class="field" id="f-company-wrap"><label>법인</label><select id="f-company-sel" style="width:100%"></select></div>
    </div>
    <div class="check-row">
      <input type="checkbox" id="split-chk" onchange="toggleSplit()">
      <label for="split-chk" style="cursor:pointer">분할 기재 (1건을 여러 계정으로 분리)</label>
    </div>
    <div id="single-form">
      <div class="grid2">
        <div class="field"><label>입금</label><input id="f-income" type="number" placeholder="0"></div>
        <div class="field"><label>출금</label><input id="f-expense" type="number" placeholder="0"></div>
        <div class="field"><label>1차분류</label><select id="f-cat1-sel" style="width:100%" onchange="syncCat2()"></select></div>
        <div class="field"><label>2차분류</label><select id="f-cat2-sel" style="width:100%" onchange="syncCat3()"></select></div>
        <div class="field"><label>3차분류</label><select id="f-cat3-sel" style="width:100%"></select></div>
        <div class="field"><label>비고</label><input id="f-note"></div>
      </div>
    </div>
    <div id="split-form" style="display:none">
      <div id="splits-container"></div>
      <button class="btn" onclick="addSplit()" style="margin-top:6px">+ 분할 추가</button>
    </div>
    <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:16px">
      <button class="btn" onclick="closeOverlay('form-overlay')">취소</button>
      <button class="btn btn-primary" onclick="saveRow()">저장</button>
    </div>
  </div>
</div>

<!-- AI 분류 모달 -->
<div class="overlay" id="paste-overlay" onclick="bgClose(event,'paste-overlay')">
  <div class="modal" style="max-width:500px">
    <div class="modal-hd">
      <span class="modal-title">🤖 AI 자동분류</span>
      <button class="close-btn" onclick="closeOverlay('paste-overlay')">×</button>
    </div>
    <p style="font-size:13px;color:#666;margin-bottom:10px">엑셀에서 복사한 내역을 붙여넣으세요.<br>탭 구분: 날짜 | 기재내용 | 입금 | 출금 | (계좌)</p>
    <textarea id="paste-area" rows="10" style="width:100%" placeholder="2026.01.05&#9;FACEBK&#9;0&#9;1364325&#9;마케팅&#10;2026.01.07&#9;박진하&#9;500000&#9;0&#9;매출계좌"></textarea>
    <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:10px">
      <button class="btn" onclick="closeOverlay('paste-overlay')">취소</button>
      <button class="btn btn-primary" id="ai-btn" onclick="runAI()">AI 분류 시작</button>
    </div>
    <div id="ai-status" style="margin-top:8px;font-size:13px;color:#888"></div>
  </div>
</div>

<script>
// ── 색상 팔레트 ──────────────────────────────────────────
const COLORS = ['#2563eb','#16a34a','#dc2626','#9333ea','#ea580c','#0891b2','#65a30d','#db2777','#d97706','#475569'];
let selectedColor = COLORS[0];

// ── 상태 ─────────────────────────────────────────────────
let state = JSON.parse(localStorage.getItem('ledger_v2') || 'null') || {
  companies: [],   // [{id, name, regno, color}]
  rows: [],        // [{id, companyId, date, month, desc, income, expense, cat1, cat2, cat3, note, wallet, splitGroup}]
  accounts: {},    // companyId → {cat1: {cat2: [cat3]}}
  wallets: {},     // companyId → [wallet]
};

let currentCompany = null; // id or '__all__'
let editRowId = null;
let editCompanyId = null;
let splits = [];
let currentTab = 'ledger';

function save() { localStorage.setItem('ledger_v2', JSON.stringify(state)); }
function fmt(n) { return Number(n||0).toLocaleString('ko-KR'); }
function num(s) { return parseFloat(String(s||0).replace(/,/g,''))||0; }
function uid() { return Date.now() + Math.random().toString(36).slice(2); }

function getAccounts(cid) { return state.accounts[cid] || {}; }
function getWallets(cid) { return state.wallets[cid] || []; }
function getRows(cid) {
  if (cid === '__all__') return state.rows;
  return state.rows.filter(r => r.companyId === cid);
}
function getCompany(id) { return state.companies.find(c => c.id === id); }

// ── 사이드바 ─────────────────────────────────────────────
function renderSidebar() {
  document.getElementById('company-list').innerHTML = state.companies.map(c => `
    <div class="company-item ${currentCompany===c.id?'active':''}" onclick="selectCompany('${c.id}')">
      <div class="dot" style="background:${c.color}"></div>
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.name}</span>
    </div>`).join('');
  document.getElementById('all-btn').className = 'company-all' + (currentCompany==='__all__'?' active':'');
}

function selectCompany(id) {
  currentCompany = id;
  renderSidebar();

  const isAll = id === '__all__';
  const c = isAll ? null : getCompany(id);

  document.getElementById('no-company').style.display = 'none';
  document.getElementById('content-area').style.display = '';
  document.getElementById('page-title').textContent = isAll ? '전체 합산' : c.name;

  const badge = document.getElementById('company-badge');
  if (!isAll && c) {
    badge.style.display = '';
    badge.style.background = c.color;
    badge.textContent = c.regno || '법인';
  } else {
    badge.style.display = 'none';
  }

  // 전체보기일 때 설정탭 숨김
  document.getElementById('tab-settings-btn').style.display = isAll ? 'none' : '';
  document.getElementById('btn-add').style.display = isAll ? 'none' : '';
  document.getElementById('btn-ai').style.display = isAll ? 'none' : '';
  document.getElementById('btn-edit-company').style.display = isAll ? 'none' : '';
  document.getElementById('company-actions').style.display = '';

  if (currentTab === 'settings' && isAll) switchTab('ledger');
  else renderCurrentTab();
}

// ── 탭 ──────────────────────────────────────────────────
function switchTab(t) {
  currentTab = t;
  ['ledger','monthly','yearly','cashflow','settings'].forEach(id => {
    document.getElementById('tab-'+id).style.display = id===t ? '' : 'none';
  });
  document.querySelectorAll('.tab').forEach((el,i) => {
    el.classList.toggle('active', ['ledger','monthly','yearly','cashflow','settings'][i]===t);
  });
  renderCurrentTab();
}
function renderCurrentTab() {
  if (currentTab==='ledger') renderLedger();
  else if (currentTab==='monthly') renderMonthly();
  else if (currentTab==='yearly') renderYearly();
  else if (currentTab==='cashflow') renderCashflow();
  else if (currentTab==='settings') renderSettings();
}

// ── 거래내역 ─────────────────────────────────────────────
function getFiltered() {
  const s = document.getElementById('search').value;
  const fm = document.getElementById('f-month').value;
  const fa = document.getElementById('f-cat1').value;
  const fw = document.getElementById('f-wallet').value;
  return getRows(currentCompany).filter(r => {
    if (fm && r.month !== fm) return false;
    if (fa && r.cat1 !== fa) return false;
    if (fw && r.wallet !== fw) return false;
    if (s && !r.desc?.includes(s) && !r.note?.includes(s) && !r.cat2?.includes(s)) return false;
    return true;
  });
}

      <tr>${tdL('　 출금')}${inv.map(v=>`<td style="padding:5px 10px;text-align:right;font-size:12px;color:#c0392b">${v.e?fmt(v.e):''}</td>`).join('')}</tr>
      <tr style="background:#fdf5eb">${tdL('Ⅲ. 재무활동 현금흐름',true,'#fdf5eb')}${fin.map(v=>tdN(v.i-v.e,true)).join('')}</tr>
      <tr>${tdL('　 입금')}${fin.map(v=>`<td style="padding:5px 10px;text-align:right;font-size:12px;color:#1a7a4a">${v.i?fmt(v.i):''}</td>`).join('')}</tr>
      <tr>${tdL('　 출금')}${fin.map(v=>`<td style="padding:5px 10px;text-align:right;font-size:12px;color:#c0392b">${v.e?fmt(v.e):''}</td>`).join('')}</tr>

function handleKey(e,type) {
  if (e.shiftKey && e.key==='Enter') {
    e.preventDefault();
    const el=e.target, p=el.selectionStart;
    el.value=el.value.slice(0,p)+'\n'+el.value.slice(p);
    el.selectionStart=el.selectionEnd=p+1;
  } else if (e.key==='Enter'&&!e.shiftKey) {
    e.preventDefault();
    ({wallet:addWallet,cat1:addCat1,cat2:addCat2,cat3:addCat3})[type]?.();
  }
}
function getLines(id){ return document.getElementById(id).value.split('\n').map(s=>s.trim()).filter(Boolean); }

function ensureAccounts(cid){ if(!state.accounts[cid]) state.accounts[cid]={}; }
function ensureWallets(cid){ if(!state.wallets[cid]) state.wallets[cid]=[]; }

function addWallet(){ const cid=currentCompany; ensureWallets(cid); getLines('new-wallet').forEach(v=>{if(v&&!state.wallets[cid].includes(v))state.wallets[cid].push(v);}); save(); renderSettings(); document.getElementById('new-wallet').value=''; }
function delWallet(w){ state.wallets[currentCompany]=getWallets(currentCompany).filter(x=>x!==w); save(); renderSettings(); }
function addCat1(){ const cid=currentCompany; ensureAccounts(cid); getLines('new-cat1').forEach(v=>{if(v&&!state.accounts[cid][v])state.accounts[cid][v]={};}); save(); renderSettings(); document.getElementById('new-cat1').value=''; }
function delCat1(c){ delete state.accounts[currentCompany][c]; save(); renderSettings(); }
function addCat2(){ const cid=currentCompany,c1=document.getElementById('sel-p1').value; if(!c1){alert('1차를 선택하세요');return;} ensureAccounts(cid); if(!state.accounts[cid][c1])state.accounts[cid][c1]={}; getLines('new-cat2').forEach(v=>{if(v&&!state.accounts[cid][c1][v])state.accounts[cid][c1][v]=[];}); save(); renderSettings(); document.getElementById('new-cat2').value=''; }
function delCat2(c1,c2){ delete state.accounts[currentCompany][c1][c2]; save(); renderSettings(); }
function addCat3(){ const cid=currentCompany,c1=document.getElementById('sel-p1-3').value,c2=document.getElementById('sel-p2-3').value; if(!c1||!c2){alert('1차와 2차를 선택하세요');return;} getLines('new-cat3').forEach(v=>{if(v&&!state.accounts[cid][c1][c2].includes(v))state.accounts[cid][c1][c2].push(v);}); save(); renderSettings(); document.getElementById('new-cat3').value=''; }

function openCompanyForm(id) {
  editCompanyId = id||null;

  document.getElementById('company-modal-title').textContent = id ? '법인 수정' : '법인 추가';

  renderColorPicker(selectedColor);
  document.getElementById('company-overlay').classList.add('show');

function saveCompany() {
  const name=document.getElementById('c-name').value.trim();
  if(!name){alert('법인명을 입력하세요');return;}
  if(editCompanyId) {
    const c=getCompany(editCompanyId);
    c.name=name; c.regno=document.getElementById('c-regno').value.trim(); c.color=selectedColor;
  } else {
    const id=uid();
    state.companies.push({id,name,regno:document.getElementById('c-regno').value.trim(),color:selectedColor});
    ensureAccounts(id); ensureWallets(id);
  }
  save(); renderSidebar(); closeOverlay('company-overlay');
  if(editCompanyId) selectCompany(editCompanyId);
}

function toggleSplit(){
  const on=document.getElementById('split-chk').checked;
  document.getElementById('single-form').style.display=on?'none':'';
  document.getElementById('split-form').style.display=on?'':'none';
  if(on&&splits.length===0) addSplit();
}
function addSplit(){ splits.push({income:'',expense:'',cat1:'',cat2:'',cat3:'',note:''}); renderSplits(); }
function removeSplit(i){ splits.splice(i,1); renderSplits(); }
function renderSplits(){
  const ac=getAccounts(currentCompany);
  document.getElementById('splits-container').innerHTML=splits.map((s,i)=>`
    <div class="split-box">
      <div style="font-size:12px;font-weight:600;margin-bottom:8px;color:#666">분할 ${i+1}
        ${splits.length>1?`<button class="btn-sm btn-danger" onclick="removeSplit(${i})" style="float:right">제거</button>`:''}
      </div>
      <div class="grid2">
        <div class="field"><label>입금</label><input type="number" value="${s.income}" onchange="splits[${i}].income=this.value" placeholder="0"></div>
        <div class="field"><label>출금</label><input type="number" value="${s.expense}" onchange="splits[${i}].expense=this.value" placeholder="0"></div>
        <div class="field"><label>1차분류</label>
          <select style="width:100%" onchange="splits[${i}].cat1=this.value;splits[${i}].cat2='';splits[${i}].cat3='';renderSplits()">
            <option value="">선택...</option>${Object.keys(ac).map(c=>`<option ${s.cat1===c?'selected':''}>${c}</option>`).join('')}
          </select></div>
        <div class="field"><label>2차분류</label>
          <select style="width:100%" onchange="splits[${i}].cat2=this.value;splits[${i}].cat3='';renderSplits()">
            <option value="">선택...</option>${Object.keys(ac[s.cat1]||{}).map(c=>`<option ${s.cat2===c?'selected':''}>${c}</option>`).join('')}
          </select></div>
        <div class="field"><label>3차분류</label>
          <select style="width:100%" onchange="splits[${i}].cat3=this.value">
            <option value="">선택...</option>${(ac[s.cat1]?.[s.cat2]||[]).map(c=>`<option ${s.cat3===c?'selected':''}>${c}</option>`).join('')}
          </select></div>
        <div class="field"><label>비고</label><input value="${s.note}" onchange="splits[${i}].note=this.value"></div>
      </div>
    </div>`).join('');
}

function saveRow(){
  const base={companyId:currentCompany,date:document.getElementById('f-date').value,month:document.getElementById('f-month-val').value,desc:document.getElementById('f-desc').value,wallet:document.getElementById('f-wallet-sel').value};
  const isSplit=document.getElementById('split-chk').checked;
  if(isSplit&&splits.length>0){
    const grp=uid();
    const newRows=splits.map(s=>({...base,id:uid(),splitGroup:grp,income:s.income,expense:s.expense,cat1:s.cat1,cat2:s.cat2,cat3:s.cat3,note:s.note}));
    if(editRowId) state.rows=state.rows.filter(r=>r.id!==editRowId);
    state.rows=[...state.rows,...newRows];
  } else {
    const row={...base,id:editRowId||uid(),income:document.getElementById('f-income').value,expense:document.getElementById('f-expense').value,cat1:document.getElementById('f-cat1-sel').value,cat2:document.getElementById('f-cat2-sel').value,cat3:document.getElementById('f-cat3-sel').value,note:document.getElementById('f-note').value};
    if(editRowId) state.rows=state.rows.map(r=>r.id===editRowId?row:r);
    else state.rows.push(row);
  }
  save(); closeOverlay('form-overlay'); renderLedger();
}

// ── AI 분류 ──────────────────────────────────────────────
function openPaste(){ document.getElementById('paste-overlay').classList.add('show'); }
async function runAI(){
  const text=document.getElementById('paste-area').value.trim(); if(!text) return;
  const ac=getAccounts(currentCompany);
  document.getElementById('ai-btn').disabled=true;
  document.getElementById('ai-status').textContent='분류 중...';
  try {
    const prompt=`다음 법인 거래내역을 분석해서 JSON 배열로 반환해.
각 항목: date(문자열), desc, income(숫자), expense(숫자), cat1, cat2, cat3, note, wallet, month("26년 01월" 형식)
1차분류: ${Object.keys(ac).join(',')}
2차분류: ${JSON.stringify(ac)}
계좌: ${getWallets(currentCompany).join(',')}
거래내역:\n${text}\nJSON만 반환, 마크다운 없이.`;
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:4000,messages:[{role:'user',content:prompt}]})});
    const data=await res.json();
    const txt=(data.content?.[0]?.text||'[]').replace(/```json|```/g,'').trim();
    const parsed=JSON.parse(txt);
    const newRows=parsed.map(r=>({id:uid(),companyId:currentCompany,date:r.date||'',month:r.month||'',desc:r.desc||'',income:String(r.income||0),expense:String(r.expense||0),cat1:r.cat1||'',cat2:r.cat2||'',cat3:r.cat3||'',note:r.note||'',wallet:r.wallet||''}));
    state.rows=[...state.rows,...newRows];
    save(); renderLedger(); closeOverlay('paste-overlay');
    document.getElementById('paste-area').value='';
    alert(newRows.length+'건 자동 분류 완료!');
  } catch(e){ document.getElementById('ai-status').textContent='오류: '+e.message; }
  document.getElementById('ai-btn').disabled=false;
  document.getElementById('ai-status').textContent='';
}

// ── 유틸 ─────────────────────────────────────────────────
function closeOverlay(id){ document.getElementById(id).classList.remove('show'); }
function bgClose(e,id){ if(e.target===e.currentTarget) closeOverlay(id); }

// ── 초기화 ───────────────────────────────────────────────
renderSidebar();
</script>
